---
- name: AIOps Demo - Remediate Network Throughput Anomaly (Auto-Loop)
  hosts: itsi
  gather_facts: false

  vars:
    splunk_base_url: "https://splunk-9-netrunner.demoredhat.com:8089"
    injector_rest_path: "/servicesNS/admin/search/saved/searches/Demo%3A%20Network%20Spike%20Injector"
    service_id: "b837ff99-b368-4798-bfd0-ac8d24a12aa4"
    kpi_id: "5ebc485242bd9694fbd7c1ba"
    normalization_wait_minutes: 6
    restart_delay_minutes: 3

  tasks:
    # ── Step 1: Disable spike injector (simulate auto-scale) ──
    - name: Disable Demo Network Spike Injector saved search
      block:
        - name: Disable the spike injector saved search
          ansible.builtin.uri:
            url: "{{ splunk_base_url }}{{ injector_rest_path }}"
            method: POST
            user: "{{ ansible_user }}"
            password: "{{ ansible_httpapi_pass }}"
            force_basic_auth: true
            validate_certs: false
            body_format: form-urlencoded
            body:
              disabled: "1"
            follow_redirects: all
            status_code: [200, 303]
          delegate_to: localhost
          register: disable_result

        - name: Log remediation started
          ansible.builtin.debug:
            msg: >-
              Spike injector disabled. Waiting {{ normalization_wait_minutes }} min
              for KPI 'Network Throughput - Bytes In' on 'On-Prem DB' to normalize.

      rescue:
        - name: Log failure to disable injector
          ansible.builtin.fail:
            msg: >-
              Failed to disable spike injector at {{ splunk_base_url }}{{ injector_rest_path }}.
              Check Splunk REST API connectivity and credentials.

    # ── Step 2: Wait for KPI to normalize ──
    - name: Wait for forecast to stabilize and KPI to return to Normal
      ansible.builtin.pause:
        minutes: "{{ normalization_wait_minutes }}"

    # ── Step 3: Find and close active critical episodes ──
    - name: Remediate ITSI episodes
      block:
        - name: Get all critical episodes
          splunk.itsi.itsi_episode_details_info:
            filter_data: '{"severity": "6"}'
            fields: "_key,title,severity,status"
            sort_key: "mod_time"
            sort_dir: 0
            limit: 50
          register: all_critical_episodes
          retries: 3
          delay: 10
          until: all_critical_episodes is not failed

        - name: Filter to active episodes only (exclude Resolved and Closed)
          ansible.builtin.set_fact:
            active_episodes: >-
              {{ all_critical_episodes.episodes | default([])
                 | rejectattr('status', 'in', ['4', '5']) | list }}

        - name: Log found episodes
          ansible.builtin.debug:
            msg: >-
              Found {{ active_episodes | length }} active critical episode(s)
              (filtered from {{ all_critical_episodes.episodes | default([]) | length }} total).

        - name: Add remediation comment to episodes
          splunk.itsi.itsi_add_episode_comments:
            episode_key: "{{ item._key }}"
            comment: "Network infra has been auto-scaled by Ansible"
          loop: "{{ active_episodes }}"
          loop_control:
            label: "{{ item.title | default(item._key) }}"
          when: active_episodes | length > 0

        - name: Close episodes - mark resolved
          splunk.itsi.itsi_update_episode_details:
            episode_id: "{{ item._key }}"
            status: "5"
            severity: "2"
            owner: "admin"
            instruction: "Auto-remediated by Ansible - Network infrastructure scaled"
          loop: "{{ active_episodes }}"
          loop_control:
            label: "{{ item.title | default(item._key) }}"
          when: active_episodes | length > 0

        - name: Log remediation complete
          ansible.builtin.debug:
            msg: >-
              Remediation complete. {{ active_episodes | length }} episode(s) closed.
              On-Prem DB service returning to Normal.

      rescue:
        - name: Log episode remediation failure
          ansible.builtin.debug:
            msg: >-
              WARNING - Failed to query or close ITSI episodes.
              Continuing to re-enable spike injector to avoid broken demo state.

    # ── Step 4: Re-enable spike injector for next demo cycle ──
    - name: Wait before restarting demo cycle
      ansible.builtin.pause:
        minutes: "{{ restart_delay_minutes }}"

    - name: Re-enable Demo Network Spike Injector saved search
      ansible.builtin.uri:
        url: "{{ splunk_base_url }}{{ injector_rest_path }}"
        method: POST
        user: "{{ ansible_user }}"
        password: "{{ ansible_httpapi_pass }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          disabled: "0"
        follow_redirects: all
        status_code: [200, 303]
      delegate_to: localhost

    - name: Log cycle restart
      ansible.builtin.debug:
        msg: >-
          Spike injector re-enabled. Next injection in ~5 min.
          Demo loop continues automatically.
