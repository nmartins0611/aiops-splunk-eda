- name: Network AIOPS
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Network Load issue Detected
      condition: event.payload.title is search("api-gateway") 
      throttle:
        group_by_attributes:
          - event.payload.service_title     # Corrected field name reference
        once_within: 10 minutes
      action:
        run_workflow_template:
          name: Network Throughput Remediation
          organization: Default
          post_events: true
