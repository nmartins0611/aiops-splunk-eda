- name: Network AIOPS
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: Network Load issue Detected
      condition: event.payload.sourcetype is defined and event.payload.sourcetype == "itsi_notable:group" and event.payload.itsi_policy_id is defined and event.payload.itsi_policy_id == "ee2d56fe-1ef8-11f1-9a43-06dfc3703af7"
      throttle:
        group_by_attributes:
          - event.payload.itsi_group_id
        once_within: 15 minutes
      action:
        run_job_template:
          name: Network loadbalance
          organization: Default
          post_events: true

    - name: Catch all webhook events for debugging
      condition: event.payload is defined
      action:
        debug:
          msg: "Event keys: {{ event.payload.keys() | list }}"
