---
- name: MLTK Network Throughput Alert Handler
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Match MLTK Network Throughput threshold breach
      condition: event.payload.itsi_group_title is match("MLTK Alert: Network Throughput predicted to reach .* \\(threshold: 800,000\\)")
      throttle:
        group_by_attributes:
          - event.payload.service_title     # Corrected field name reference
        once_within: 10 minutes
      action:
        run_template:
          name: Network Throughput Remediation
          organization: Default
          post_events: true

 
